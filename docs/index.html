<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>台美股智慧分析</title>
  <meta name="description" content="台美股智慧分析：基本面、技術面、籌碼面整合研究。僅供研究，不構成投資建議。" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header>
    <h1>📈 台美股智慧分析</h1>
    <p class="sub">基本面 × 技術面 × 籌碼面　整合研究分析（僅供研究，不構成投資建議）</p>
  </header>

  <main>
    <section class="card">
      <h2>🔎 查詢個股</h2>
      <div class="row">
        <select id="market">
          <option value="TW">台股</option>
          <option value="US">美股</option>
        </select>
        <input id="symbol" type="text" placeholder="例：2330 或 AAPL" maxlength="10" autocomplete="off" />
        <button id="go">分析</button>
      </div>
      <div class="row">
        <input id="cost" type="number" step="any" min="0" placeholder="持股成本（選填）" />
        <input id="qty" type="number" step="any" min="0" placeholder="股數（選填）" />
        <button id="save" class="ghost">加入我的持股</button>
      </div>
      <div id="status" class="status"></div>
    </section>

    <section class="card">
      <h2>⭐ 我的持股</h2>
      <div id="holdings" class="chips"></div>
      <button id="analyzeAll" class="ghost">分析全部持股</button>
      <button id="clearAll" class="ghost danger">清空</button>
    </section>

    <section id="results"></section>
  </main>

  <footer>
    <p>資料來源：FinMind 開放 API。以上僅為資料整理與趨勢分析，不構成投資建議。</p>
  </footer>

  <script src="./app.js"></script>
</body>
</html>
