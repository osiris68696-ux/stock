<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>台美股・黃金智慧分析</title>
  <meta name="description" content="台美股與黃金價格追蹤：股票 × 黃金 × 技術面 × 籌碼面，投資決策輔助工具。僅供研究，不構成投資建議。" />
  <link rel="stylesheet" href="./style.css?v=20260623-023" />
</head>
<body>
  <header class="appbar"><div class="appbar-inner"><span class="brand">📈 台美股・黃金智慧分析</span></div></header>

  <main class="shell">
    <!-- Hero -->
    <section class="hero">
      <h1>台美股・黃金智慧分析</h1>
      <p class="tagline">股票 × 黃金 × 技術面 × 籌碼面｜投資決策輔助工具</p>
    </section>

    <!-- 上方輔助入口卡：只保留黃金價格 / 新聞搜尋 -->
    <div class="entry-cards">
      <button class="entry-card" data-act="gold"><span class="ico">🥇</span><b>黃金價格</b><small>國際金價與歷年走勢</small></button>
      <button class="entry-card" data-act="twnews"><span class="ico">📰</span><b>新聞搜尋</b><small>台股 / 美股新聞</small></button>
    </div>

    <!-- 中央視覺 HUD（純 CSS，僅視覺與狀態提示，不放任何功能） -->
    <section class="hud" id="hud">
      <div class="hud-ring"><div class="hud-core"><b>MARKET</b><span>INTELLIGENCE</span></div></div>
      <p class="hud-hint">輸入股票代號開始分析</p>
      <p class="hud-src">僅供研究與趨勢分析，不構成投資建議。</p>
    </section>

    <!-- 主功能：股票快查 + 我的持股 同一列 -->
    <div class="tool-row">
      <section class="card main-card" id="query">
        <h2>🔎 股票快查</h2>
        <div class="query-row">
          <div class="field"><label>市場</label>
            <select id="market"><option value="TW">台股</option><option value="US">美股</option></select></div>
          <div class="field grow"><label>股票代號或名稱</label>
            <input id="symbol" type="text" placeholder="例：2330、台積電、NVDA、輝達" maxlength="20" autocomplete="off" /></div>
        </div>
        <button id="go" class="primary-lg">開始分析</button>
        <div id="status" class="status-line"></div>
      </section>

      <section class="card" id="myholdings">
        <h2>💼 我的持股</h2>
        <div class="row">
          <select id="h-market"><option value="TW">台股</option><option value="US">美股</option></select>
          <input id="h-symbol" type="text" placeholder="代號 / 名稱" maxlength="20" autocomplete="off" />
        </div>
        <div class="row">
          <input id="cost" type="number" step="any" min="0" placeholder="成本" />
          <input id="qty" type="number" step="any" min="0" placeholder="股數" />
        </div>
        <div class="row"><button id="save" class="ghost">加入持股</button><button id="analyzeAll" class="ghost">持股診斷</button><button id="clearAll" class="ghost danger">清空</button></div>
        <div id="holdings" class="chips"></div>
      </section>
    </div>

    <!-- 結果區：單欄結果流 -->
    <div id="result"></div>
  </main>

  <footer><p>僅供研究與趨勢分析，不構成投資建議。</p></footer>

  <!-- Modal：台股相關新聞搜尋 -->
  <div class="modal" id="modal-twnews" aria-hidden="true">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-label="台股相關新聞搜尋">
      <div class="modal-head"><h3>📰 台股相關新聞搜尋</h3><button class="modal-x" data-close aria-label="關閉">✕</button></div>
      <div class="modal-body">
        <p class="panel-sub">輸入台股代號，查詢個股新聞、財報、法人與市場消息（外部搜尋，新分頁開啟）。</p>
        <div class="row news-switch"><button class="ghost" data-act="usnews">🗞️ 改搜美股新聞 →</button></div>
        <div class="row"><input id="tw-news-sym" type="text" placeholder="台股代號（4~6 位數字，例 2330、2454、2317）" maxlength="6" autocomplete="off" /></div>
        <div class="row newsbtns">
          <button class="ghost" data-news="tw" data-kind="news">搜尋台股新聞</button>
          <button class="ghost" data-news="tw" data-kind="fin">搜尋財報 / 基本面</button>
          <button class="ghost" data-news="tw" data-kind="chip">搜尋法人 / 籌碼</button>
          <button class="ghost" data-news="tw" data-kind="yahoo">Yahoo 股市</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal：美股相關新聞搜尋 -->
  <div class="modal" id="modal-usnews" aria-hidden="true">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-label="美股相關新聞搜尋">
      <div class="modal-head"><h3>🗞️ 美股相關新聞搜尋</h3><button class="modal-x" data-close aria-label="關閉">✕</button></div>
      <div class="modal-body">
        <p class="panel-sub">輸入美股代號，查詢公司新聞、財報、財測與分析師消息（外部搜尋，新分頁開啟）。</p>
        <div class="row news-switch"><button class="ghost" data-act="twnews">📰 改搜台股新聞 →</button></div>
        <div class="row"><input id="us-news-sym" type="text" placeholder="美股代號（例 AAPL、NVDA、MSFT、BRK.B）" maxlength="10" autocomplete="off" /></div>
        <div class="row newsbtns">
          <button class="ghost" data-news="us" data-kind="news">搜尋美股新聞</button>
          <button class="ghost" data-news="us" data-kind="fin">搜尋財報 / Earnings</button>
          <button class="ghost" data-news="us" data-kind="analyst">搜尋分析師消息</button>
          <button class="ghost" data-news="us" data-kind="yahoo">Yahoo Finance</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal：黃金價格分析（大型） -->
  <div class="modal modal-lg" id="modal-gold" aria-hidden="true">
    <div class="modal-backdrop" data-close></div>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-label="黃金價格分析">
      <div class="modal-head"><h3>🥇 黃金價格分析</h3><button class="modal-x" data-close aria-label="關閉">✕</button></div>
      <div class="modal-body"><div id="goldBody"><button id="goldLoad" class="primary-lg">載入金價分析</button></div></div>
    </div>
  </div>

  <script src="./app.js?v=20260623-023"></script>
</body>
</html>
