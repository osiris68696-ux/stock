<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI 股票研究助理（公開版）</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>📈 AI 股票研究助理</h1>
    <p class="sub">輸入台股 / 美股代號，取得由上而下的研究分析與決策參考。
      <strong>僅供研究，不構成投資建議。</strong></p>
  </header>

  <main>
    <section class="card">
      <h2>🔎 查詢個股</h2>
      <div class="row">
        <select id="market">
          <option value="TW">台股</option>
          <option value="US">美股</option>
        </select>
        <input id="symbol" type="text" placeholder="例：2330 或 AAPL" maxlength="12" />
        <button id="go">分析</button>
      </div>
      <div class="row">
        <input id="cost" type="number" step="any" min="0" placeholder="持股成本（選填）" />
        <input id="qty" type="number" step="any" min="0" placeholder="股數（選填）" />
        <button id="save" class="ghost">加入我的持股</button>
      </div>
      <p class="hint">填成本與股數可加做「報酬率 / 續抱 / 加碼 / 減碼 / 停利 / 停損」分析。
        這些資料只存在你的瀏覽器，<strong>不會上傳伺服器</strong>。</p>
      <div id="status" class="status"></div>
    </section>

    <section class="card">
      <h2>⭐ 我的持股（只存在你的瀏覽器）</h2>
      <p class="hint">持股清單僅存於本機 localStorage，不會上傳伺服器、也不會被任何人看到。</p>
      <div id="holdings" class="chips"></div>
      <button id="analyzeAll" class="ghost">分析全部持股</button>
      <button id="clearAll" class="ghost danger">清空</button>
    </section>

    <section id="results"></section>
  </main>

  <footer>
    <p>資料來源：TWSE、yfinance、Yahoo Finance、鉅亨網。本工具為研究用途，<strong>不構成投資建議</strong>。</p>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
